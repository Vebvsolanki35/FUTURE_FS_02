<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM – Client Lead Management</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0f0e17;
      --surface:   #1a1826;
      --card:      #22203a;
      --border:    #2e2b4a;
      --accent:    #7c3aed;
      --accent-h:  #6d28d9;
      --accent-lt: #ede9fe;
      --text:      #e2e0f0;
      --muted:     #9b99b8;
      --danger:    #ef4444;
      --new-bg:    #1e3a8a; --new-fg: #93c5fd;
      --con-bg:    #7c2d12; --con-fg: #fdba74;
      --cvt-bg:    #14532d; --cvt-fg: #86efac;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Utility ──────────────────────────────────────────── */
    .hidden { display: none !important; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-new       { background: var(--new-bg); color: var(--new-fg); }
    .badge-contacted { background: var(--con-bg); color: var(--con-fg); }
    .badge-converted { background: var(--cvt-bg); color: var(--cvt-fg); }

    /* ── Login Page ───────────────────────────────────────── */
    #login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #3b1fa3 0%, var(--bg) 70%);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }
    .login-card .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-card .logo span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 14px;
      font-size: 1.6rem;
      margin-bottom: 12px;
    }
    .login-card h1 {
      font-size: 1.55rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .login-card p.subtitle {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select option { background: var(--card); }
    .error-msg {
      color: #fca5a5;
      font-size: .82rem;
      margin-top: 10px;
      text-align: center;
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; justify-content: center; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-sm { padding: 6px 13px; font-size: .8rem; border-radius: 7px; }
    .btn-edit  { background: #1d4ed8; color: #fff; }
    .btn-edit:hover  { background: #1e40af; }
    .btn-delete { background: #991b1b; color: #fff; }
    .btn-delete:hover { background: #7f1d1d; }
    .btn-logout { background: var(--border); color: var(--muted); }
    .btn-logout:hover { background: #991b1b; color: #fff; }
    .btn-add { background: var(--accent); color: #fff; }
    .btn-add:hover { background: var(--accent-h); }
    .btn-cancel { background: var(--border); color: var(--text); }
    .btn-cancel:hover { background: #3a3660; }

    /* ── Dashboard Layout ─────────────────────────────────── */
    #dashboard {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    /* Navbar */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.15rem;
      font-weight: 700;
    }
    .navbar .brand-icon {
      background: var(--accent);
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .navbar .user-info {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: .88rem;
    }

    /* Main content */
    .main { padding: 32px; flex: 1; }

    /* ── Stats Cards ──────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-card .stat-label {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 600;
    }
    .stat-card .stat-value {
      font-size: 2.1rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-total  .stat-value { color: #a78bfa; }
    .stat-new    .stat-value { color: var(--new-fg); }
    .stat-cont   .stat-value { color: var(--con-fg); }
    .stat-conv   .stat-value { color: var(--cvt-fg); }
    .stat-card .stat-icon { font-size: 1.5rem; margin-bottom: 2px; }

    /* ── Section heading ──────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .section-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* ── Add Lead Form Panel ──────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      margin-bottom: 32px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .form-grid .span-2 { grid-column: span 2; }
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    /* ── Leads Table ──────────────────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    thead th {
      background: var(--card);
      color: var(--muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: 12px 16px;
      text-align: left;
      white-space: nowrap;
    }
    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: var(--card); }
    tbody td {
      padding: 13px 16px;
      vertical-align: top;
    }
    .td-name { font-weight: 600; }
    .td-email { color: var(--muted); font-size: .82rem; }
    .td-notes {
      max-width: 200px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      font-size: .82rem;
    }
    .actions-cell { display: flex; gap: 8px; flex-wrap: wrap; }
    .empty-row td {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }

    /* ── Modal ────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: var(--shadow);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #16a34a;
      color: #fff;
      padding: 12px 22px;
      border-radius: var(--radius);
      font-size: .9rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      z-index: 300;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 640px) {
      .main { padding: 16px; }
      .navbar { padding: 12px 16px; }
      .form-grid .span-2 { grid-column: span 1; }
      .panel { padding: 18px 16px; }
      .modal { padding: 24px 18px; }
      .stat-value { font-size: 1.7rem !important; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     LOGIN PAGE
════════════════════════════════════════════════════════════ -->
<div id="login-page">
  <div class="login-card">
    <div class="logo">
      <div><span>🎯</span></div>
      <h1>CRM Portal</h1>
      <p class="subtitle">Client Lead Management System</p>
    </div>
    <div class="form-group">
      <label for="login-user">Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="login-pass">Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password" />
    </div>
    <div id="login-error" class="error-msg hidden">Invalid username or password.</div>
    <button class="btn btn-primary" onclick="doLogin()" style="margin-top:8px">Sign In</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     DASHBOARD
════════════════════════════════════════════════════════════ -->
<div id="dashboard" class="hidden">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="brand">
      <div class="brand-icon">🎯</div>
      CRM Portal
    </div>
    <div class="user-info">
      <span>👤 admin</span>
      <button class="btn btn-sm btn-logout" onclick="doLogout()">⏻ Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">

    <!-- Summary stats -->
    <div class="stats-grid">
      <div class="stat-card stat-total">
        <div class="stat-icon">📋</div>
        <div class="stat-label">Total Leads</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card stat-new">
        <div class="stat-icon">🔵</div>
        <div class="stat-label">New</div>
        <div class="stat-value" id="stat-new">0</div>
      </div>
      <div class="stat-card stat-cont">
        <div class="stat-icon">🟠</div>
        <div class="stat-label">Contacted</div>
        <div class="stat-value" id="stat-contacted">0</div>
      </div>
      <div class="stat-card stat-conv">
        <div class="stat-icon">🟢</div>
        <div class="stat-label">Converted</div>
        <div class="stat-value" id="stat-converted">0</div>
      </div>
    </div>

    <!-- Add Lead Form -->
    <div class="panel">
      <div class="section-header">
        <h2 id="form-heading">➕ Add New Lead</h2>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label for="f-name">Name *</label>
          <input type="text" id="f-name" placeholder="Full name" />
        </div>
        <div class="form-group">
          <label for="f-email">Email *</label>
          <input type="email" id="f-email" placeholder="email@example.com" />
        </div>
        <div class="form-group">
          <label for="f-phone">Phone</label>
          <input type="tel" id="f-phone" placeholder="+1 555 000 0000" />
        </div>
        <div class="form-group">
          <label for="f-source">Source</label>
          <select id="f-source">
            <option value="Website">Website</option>
            <option value="Referral">Referral</option>
            <option value="Social Media">Social Media</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-status">Status</label>
          <select id="f-status">
            <option value="New">New</option>
            <option value="Contacted">Contacted</option>
            <option value="Converted">Converted</option>
          </select>
        </div>
        <div class="form-group span-2">
          <label for="f-notes">Notes / Follow-up</label>
          <textarea id="f-notes" placeholder="Add follow-up notes or any extra details…"></textarea>
        </div>
      </div>
      <div id="form-error" class="error-msg hidden" style="text-align:left;margin-top:4px"></div>
      <div class="form-actions">
        <button class="btn btn-cancel hidden" id="btn-cancel-edit" onclick="cancelEdit()">Cancel</button>
        <button class="btn btn-add" id="btn-submit-lead" onclick="submitLead()">➕ Add Lead</button>
      </div>
    </div>

    <!-- Leads Table -->
    <div class="section-header">
      <h2>📊 All Leads</h2>
      <span id="lead-count" style="color:var(--muted);font-size:.85rem"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Source</th>
            <th>Status</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="leads-tbody"></tbody>
      </table>
    </div>

  </div><!-- /main -->
</div><!-- /dashboard -->

<!-- ══════════════════════════════════════════════════════════
     EDIT MODAL
════════════════════════════════════════════════════════════ -->
<div id="edit-modal" class="modal-overlay hidden">
  <div class="modal">
    <h2>✏️ Edit Lead</h2>
    <div class="form-grid">
      <div class="form-group">
        <label for="e-name">Name *</label>
        <input type="text" id="e-name" placeholder="Full name" />
      </div>
      <div class="form-group">
        <label for="e-email">Email *</label>
        <input type="email" id="e-email" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label for="e-phone">Phone</label>
        <input type="tel" id="e-phone" placeholder="+1 555 000 0000" />
      </div>
      <div class="form-group">
        <label for="e-source">Source</label>
        <select id="e-source">
          <option value="Website">Website</option>
          <option value="Referral">Referral</option>
          <option value="Social Media">Social Media</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="e-status">Status</label>
        <select id="e-status">
          <option value="New">New</option>
          <option value="Contacted">Contacted</option>
          <option value="Converted">Converted</option>
        </select>
      </div>
      <div class="form-group span-2">
        <label for="e-notes">Notes / Follow-up</label>
        <textarea id="e-notes" placeholder="Follow-up notes…"></textarea>
      </div>
    </div>
    <div id="edit-error" class="error-msg hidden" style="text-align:left;margin-top:4px"></div>
    <div class="form-actions">
      <button class="btn btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" style="width:auto" onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════════════════════ -->
<script>
  /* ── Constants ───────────────────────────────────────── */
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'admin123';
  const SESSION_KEY = 'crm_session';
  const LEADS_KEY   = 'crm_leads';

  /* ── State ───────────────────────────────────────────── */
  let leads = [];
  let editingId = null;   // id of lead currently being edited in modal

  /* ── Helpers ─────────────────────────────────────────── */
  let _uidCounter = 0;
  function uid() {
    return Date.now().toString(36) + (++_uidCounter).toString(36) + Math.random().toString(36).slice(2);
  }

  function isValidEmail(email) {
    return Boolean(email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
  }

  function saveLeads() {
    localStorage.setItem(LEADS_KEY, JSON.stringify(leads));
  }

  function loadLeads() {
    try {
      leads = JSON.parse(localStorage.getItem(LEADS_KEY)) || [];
    } catch { leads = []; }
  }

  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || '#16a34a';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function badgeClass(status) {
    if (status === 'New')       return 'badge-new';
    if (status === 'Contacted') return 'badge-contacted';
    if (status === 'Converted') return 'badge-converted';
    return '';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Auth ────────────────────────────────────────────── */
  function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');

    if (user === ADMIN_USER && pass === ADMIN_PASS) {
      localStorage.setItem(SESSION_KEY, '1');
      errEl.classList.add('hidden');
      showDashboard();
    } else {
      errEl.classList.remove('hidden');
    }
  }

  function doLogout() {
    localStorage.removeItem(SESSION_KEY);
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('login-page').classList.remove('hidden');
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
  }

  function showDashboard() {
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadLeads();
    renderTable();
    updateStats();
  }

  /* ── Allow pressing Enter in login fields ────────────── */
  ['login-user', 'login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  /* ── Render Table ────────────────────────────────────── */
  function renderTable() {
    const tbody = document.getElementById('leads-tbody');
    const countEl = document.getElementById('lead-count');

    if (leads.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="7">No leads yet. Add your first lead above! 🚀</td></tr>`;
      countEl.textContent = '';
      return;
    }

    countEl.textContent = leads.length + ' lead' + (leads.length !== 1 ? 's' : '');

    tbody.innerHTML = leads.map(l => `
      <tr data-id="${escHtml(l.id)}">
        <td>
          <div class="td-name">${escHtml(l.name)}</div>
        </td>
        <td class="td-email">${escHtml(l.email)}</td>
        <td style="color:var(--muted);font-size:.82rem">${escHtml(l.phone || '—')}</td>
        <td style="font-size:.85rem">${escHtml(l.source)}</td>
        <td><span class="badge ${badgeClass(l.status)}">${escHtml(l.status)}</span></td>
        <td class="td-notes">${escHtml(l.notes || '—')}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-sm btn-edit"   data-action="edit"   data-id="${escHtml(l.id)}">✏️ Edit</button>
            <button class="btn btn-sm btn-delete" data-action="delete" data-id="${escHtml(l.id)}">🗑 Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  /* ── Stats ───────────────────────────────────────────── */
  function updateStats() {
    document.getElementById('stat-total').textContent     = leads.length;
    document.getElementById('stat-new').textContent       = leads.filter(l => l.status === 'New').length;
    document.getElementById('stat-contacted').textContent = leads.filter(l => l.status === 'Contacted').length;
    document.getElementById('stat-converted').textContent = leads.filter(l => l.status === 'Converted').length;
  }

  /* ── Add Lead ────────────────────────────────────────── */
  function submitLead() {
    const name   = document.getElementById('f-name').value.trim();
    const email  = document.getElementById('f-email').value.trim();
    const phone  = document.getElementById('f-phone').value.trim();
    const source = document.getElementById('f-source').value;
    const status = document.getElementById('f-status').value;
    const notes  = document.getElementById('f-notes').value.trim();
    const errEl  = document.getElementById('form-error');

    if (!name) { errEl.textContent = 'Name is required.'; errEl.classList.remove('hidden'); return; }
    if (!isValidEmail(email)) {
      errEl.textContent = 'A valid email is required.';
      errEl.classList.remove('hidden');
      return;
    }
    errEl.classList.add('hidden');

    leads.unshift({ id: uid(), name, email, phone, source, status, notes });
    saveLeads();
    renderTable();
    updateStats();
    clearForm();
    showToast('Lead added successfully!');
  }

  function clearForm() {
    ['f-name','f-email','f-phone','f-notes'].forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('f-source').value = 'Website';
    document.getElementById('f-status').value = 'New';
  }

  function cancelEdit() { clearForm(); }

  /* ── Delete Lead ─────────────────────────────────────── */
  function deleteLead(id) {
    if (!confirm('Are you sure you want to delete this lead?')) return;
    leads = leads.filter(l => l.id !== id);
    saveLeads();
    renderTable();
    updateStats();
    showToast('Lead deleted.', '#ef4444');
  }

  /* ── Edit Modal ──────────────────────────────────────── */
  function openEditModal(id) {
    const lead = leads.find(l => l.id === id);
    if (!lead) return;
    editingId = id;

    document.getElementById('e-name').value   = lead.name;
    document.getElementById('e-email').value  = lead.email;
    document.getElementById('e-phone').value  = lead.phone || '';
    document.getElementById('e-source').value = lead.source;
    document.getElementById('e-status').value = lead.status;
    document.getElementById('e-notes').value  = lead.notes || '';
    document.getElementById('edit-error').classList.add('hidden');

    document.getElementById('edit-modal').classList.remove('hidden');
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.add('hidden');
    editingId = null;
  }

  function saveEdit() {
    const name   = document.getElementById('e-name').value.trim();
    const email  = document.getElementById('e-email').value.trim();
    const phone  = document.getElementById('e-phone').value.trim();
    const source = document.getElementById('e-source').value;
    const status = document.getElementById('e-status').value;
    const notes  = document.getElementById('e-notes').value.trim();
    const errEl  = document.getElementById('edit-error');

    if (!name) { errEl.textContent = 'Name is required.'; errEl.classList.remove('hidden'); return; }
    if (!isValidEmail(email)) {
      errEl.textContent = 'A valid email is required.';
      errEl.classList.remove('hidden');
      return;
    }
    errEl.classList.add('hidden');

    const idx = leads.findIndex(l => l.id === editingId);
    if (idx !== -1) {
      leads[idx] = { ...leads[idx], name, email, phone, source, status, notes };
      saveLeads();
      renderTable();
      updateStats();
    }
    closeEditModal();
    showToast('Lead updated!');
  }

  /* Close modal on overlay click */
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  /* ── Event delegation for table action buttons ───────── */
  document.getElementById('leads-tbody').addEventListener('click', function(e) {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === 'edit')   openEditModal(id);
    if (btn.dataset.action === 'delete') deleteLead(id);
  });

  /* ── Bootstrap ───────────────────────────────────────── */
  (function init() {
    if (localStorage.getItem(SESSION_KEY) === '1') {
      showDashboard();
    }
  })();
</script>
</body>
</html>
